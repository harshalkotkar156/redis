services:
    redis:
        image: redis:7-alpine
        container_name: redis-demo
        ports:
            - "6379:6379"
        command: ["redis-server", "--appendonly", "yes"]
        volumes:
            - redis-data:/data
    mongo:
        image: mongo:7
        container_name: mongo-demo
        environment:
            MONGO_INITDB_DATABASE: mydb
        ports:
            - "27017:27017"
        volumes:
            - mongo-data:/data/db
volumes:
    redis-data:
    mongo-data: 
